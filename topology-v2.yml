infrastructure:
  bastion:
    vcpu: 1
    memory_mb: 384
    mgmt_ip: 192.168.0.2
    metrics_port: 9100
    description: SSH jump host and NAT gateway for fabric
  mgmt:
    vcpu: 2
    memory_mb: 2048
    mgmt_ip: 192.168.0.3
    metrics_port: 9100
    services:
    - prometheus: 9090
    - grafana: 3000
    - loki: 3100
    - dnsmasq: 53
    - chrony: 123
    description: Observability stack, DHCP/DNS, NTP
  obs:
    mgmt_ip: 192.168.0.4
    memory_mb: 2048
management:
  bridge: virbr2
  cidr: 192.168.0.0/24
  gateway: 192.168.0.1
  dhcp_server: mgmt
  dns_domain: netwatch.lab
observability:
  prometheus:
    host: mgmt
    port: 9090
    scrape_interval_s: 15
    targets:
      frr_nodes:
        port: 9342
        nodes:
        - border-1
        - border-2
        - spine-1
        - spine-2
        - leaf-1a
        - leaf-1b
        - leaf-2a
        - leaf-2b
        - leaf-3a
        - leaf-3b
        - leaf-4a
        - leaf-4b
      vm_nodes:
        port: 9100
        nodes:
        - srv-1-1
        - srv-1-2
        - srv-1-3
        - srv-1-4
        - srv-2-1
        - srv-2-2
        - srv-2-3
        - srv-2-4
        - srv-3-1
        - srv-3-2
        - srv-3-3
        - srv-3-4
        - srv-4-1
        - srv-4-2
        - srv-4-3
        - srv-4-4
        - bastion
        - mgmt
  grafana:
    host: mgmt
    port: 3000
    dashboards:
    - fabric-overview
    - bgp-status
    - node-detail
    - interface-counters
    - chaos-events
    - evpn-vxlan
  loki:
    host: mgmt
    port: 3100
    description: rsyslog from all nodes -> Loki -> Grafana LogQL
addressing:
  loopback:
    cidr: 10.0.0.0/16
    description: 'Advertised into BGP. Used as router-ID and scrape target. 10.0.1.x = border, 10.0.2.x = spine, 10.0.3.x
      = leaf, 10.0.4.x = rack-1 servers, 10.0.5.x = rack-2 servers, 10.0.6.x = rack-3 servers, 10.0.7.x = rack-4 servers.

      '
  fabric:
    cidr: 172.16.0.0/16
    description: Point-to-point /30 subnets. Connected routes only.
    pools:
      border_bastion: 172.16.0.0/24
      border_spine: 172.16.1.0/24
      spine_leaf: 172.16.2.0/24
      leaf_server_rack1: 172.16.3.0/24
      leaf_server_rack2: 172.16.4.0/24
      leaf_server_rack3: 172.16.5.0/24
      leaf_server_rack4: 172.16.6.0/24
  services:
    cidr: 10.100.0.0/24
    description: 'MetalLB external IP pool. Assigned to k3s LoadBalancer services. Announced as /32 routes via BGP from MetalLB
      speakers to leaf switches. Reachable from host via: ip route add 10.100.0.0/24 via 192.168.0.2

      '
  management:
    cidr: 192.168.0.0/24
    gateway: 192.168.0.1
    description: OOB management. Isolated from fabric. DHCP served by mgmt node.
asn:
  border: 65000
  spine: 65001
  racks:
    rack-1: 65101
    rack-2: 65102
    rack-3: 65103
    rack-4: 65104
evpn:
  enabled: true
  vni_base: 10000
  vtep_nodes:
  - leaf-1a
  - leaf-1b
  - leaf-2a
  - leaf-2b
  - leaf-3a
  - leaf-3b
  - leaf-4a
  - leaf-4b
  description: VNI-per-tenant overlay. Leaf VTEPs. Implemented in Phase 7.
