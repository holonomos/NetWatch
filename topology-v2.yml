project:
  name: netwatch
  version: '1.0'
  description: '30-node hyperscale data-center lab emulator built around a 12-node 3-tier L3 Clos routing fabric. All VMs,
    no Docker.

    '
timers:
  dilation_factor: 10
  bfd:
    tx_interval_ms: 1000
    rx_interval_ms: 1000
    detect_multiplier: 3
  bgp:
    keepalive_s: 30
    holdtime_s: 90
