address=/leaf-4b.netwatch.lab/192.168.0.37
address=/mgmt.netwatch.lab/192.168.0.3
address=/spine-1.netwatch.lab/192.168.0.20
address=/spine-2.netwatch.lab/192.168.0.21
address=/srv-1-1.netwatch.lab/192.168.0.50
address=/srv-1-2.netwatch.lab/192.168.0.51
