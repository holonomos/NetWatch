# NetWatch — dnsmasq configuration
# Generated from topology.yml — DO NOT HAND-EDIT
#
# Authoritative DNS server for the OOB management network.
# Resolves hostname.netwatch.lab → management IP for all 30 nodes.
# DHCP is handled by libvirt on the host — dnsmasq is DNS-only.

# --- General ---
domain=netwatch.lab
local=/netwatch.lab/
expand-hosts
no-resolv
bogus-priv

# --- Upstream DNS (external resolution for k3s image pulls, etc.) ---
server=1.1.1.1
server=8.8.8.8

# --- DNS only (DHCP handled by libvirt on the host) ---
port=53

# --- DNS entries (hostname → management IP) ---
address=/bastion.netwatch.lab/192.168.0.2
address=/border-1.netwatch.lab/192.168.0.10
address=/border-2.netwatch.lab/192.168.0.11
address=/leaf-1a.netwatch.lab/192.168.0.30
address=/leaf-1b.netwatch.lab/192.168.0.31
