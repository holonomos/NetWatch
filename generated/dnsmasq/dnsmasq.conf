# NetWatch — dnsmasq configuration
# Generated from topology.yml — DO NOT HAND-EDIT
#
# Provides DHCP reservations and DNS for the OOB management network.
# All 30 nodes get static MAC→IP bindings and hostname.domain DNS entries.

# --- General ---
domain=netwatch.lab
local=/netwatch.lab/
expand-hosts
no-resolv
bogus-priv

# --- DHCP range (for unknown clients, narrow range) ---
dhcp-range=192.168.0.1,static,255.255.255.0,infinite

# --- Default gateway ---
dhcp-option=option:router,192.168.0.1

# --- DNS server (self) ---
dhcp-option=option:dns-server,192.168.0.1

# --- DHCP reservations (MAC → IP → hostname) ---
dhcp-host=02:4E:57:05:00:01,192.168.0.2,bastion,infinite
dhcp-host=02:4E:57:01:00:01,192.168.0.10,border-1,infinite
