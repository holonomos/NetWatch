!
! NetWatch — FRR configuration for leaf-4a
! Generated from topology.yml — DO NOT HAND-EDIT
!
frr defaults datacenter
hostname leaf-4a
log syslog informational
service integrated-vtysh-config
!
! --- Loopback ---
interface lo
 ip address 10.0.3.7/32
!
! --- Fabric interfaces ---
interface eth-spine-1
 ip address 172.16.2.26/30
 no shutdown
!
interface eth-spine-2
 ip address 172.16.2.58/30
 no shutdown
!
interface eth-srv-4-1
 ip address 172.16.6.1/30
 no shutdown
!
interface eth-srv-4-2
 ip address 172.16.6.9/30
 no shutdown
!
interface eth-srv-4-3
 ip address 172.16.6.17/30
 no shutdown
!
interface eth-srv-4-4
 ip address 172.16.6.25/30
 no shutdown
!
! --- Static routes to server loopbacks ---
ip route 10.0.7.1/32 172.16.6.2
ip route 10.0.7.2/32 172.16.6.10
ip route 10.0.7.3/32 172.16.6.18
ip route 10.0.7.4/32 172.16.6.26
!
! --- Prefix list: deny management subnet from redistribution ---
ip prefix-list CONNECTED-FILTER seq 5 deny 192.168.0.0/24 le 32
ip prefix-list CONNECTED-FILTER seq 100 permit 0.0.0.0/0 le 32
!
! --- Route map for redistribute filtering ---
route-map CONNECTED-FILTER permit 10
 match ip address prefix-list CONNECTED-FILTER
exit
!
! --- BGP ---
router bgp 65104
 bgp router-id 10.0.3.7
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 bgp bestpath as-path multipath-relax
 timers bgp 30 90
 !
 ! --- Neighbors ---
 neighbor 172.16.2.25 remote-as 65001
 neighbor 172.16.2.25 description spine-1
 neighbor 172.16.2.25 bfd
 neighbor 172.16.2.57 remote-as 65001
 neighbor 172.16.2.57 description spine-2
 neighbor 172.16.2.57 bfd
 !
 ! --- IPv4 Unicast ---
 address-family ipv4 unicast
  redistribute connected route-map CONNECTED-FILTER
  redistribute static
  maximum-paths 8
  neighbor 172.16.2.25 activate
  neighbor 172.16.2.25 allowas-in 1
  neighbor 172.16.2.57 activate
  neighbor 172.16.2.57 allowas-in 1
 exit-address-family
 !
 ! --- L2VPN EVPN ---
 address-family l2vpn evpn
  neighbor 172.16.2.25 activate
  neighbor 172.16.2.57 activate
  advertise-all-vni
 exit-address-family
exit
!
! --- BFD ---
bfd
 peer 172.16.2.25
  transmit-interval 1000
  receive-interval 1000
  detect-multiplier 3
 exit
 !
 peer 172.16.2.57
  transmit-interval 1000
  receive-interval 1000
  detect-multiplier 3
 exit
 !
exit
!
end
