!
! NetWatch — FRR configuration for leaf-2a
! Generated from topology.yml — DO NOT HAND-EDIT
!
frr defaults datacenter
hostname leaf-2a
log syslog informational
service integrated-vtysh-config
!
! --- Loopback ---
interface lo
 ip address 10.0.3.3/32
!
! --- Fabric interfaces ---
interface eth-spine-1
 ip address 172.16.2.10/30
 no shutdown
!
interface eth-spine-2
 ip address 172.16.2.42/30
 no shutdown
!
interface eth-srv-2-1
 ip address 172.16.4.1/30
 no shutdown
!
interface eth-srv-2-2
 ip address 172.16.4.9/30
 no shutdown
!
interface eth-srv-2-3
 ip address 172.16.4.17/30
 no shutdown
!
interface eth-srv-2-4
 ip address 172.16.4.25/30
 no shutdown
!
! --- Static routes to server loopbacks ---
ip route 10.0.5.1/32 172.16.4.2
ip route 10.0.5.2/32 172.16.4.10
ip route 10.0.5.3/32 172.16.4.18
ip route 10.0.5.4/32 172.16.4.26
!
! --- Prefix list: deny management subnet from redistribution ---
ip prefix-list CONNECTED-FILTER seq 5 deny 192.168.0.0/24 le 32
ip prefix-list CONNECTED-FILTER seq 100 permit 0.0.0.0/0 le 32
!
! --- Route map for redistribute filtering ---
route-map CONNECTED-FILTER permit 10
 match ip address prefix-list CONNECTED-FILTER
exit
!
! --- BGP ---
router bgp 65102
 bgp router-id 10.0.3.3
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 bgp bestpath as-path multipath-relax
 timers bgp 30 90
 !
 ! --- Neighbors ---
 neighbor 172.16.2.9 remote-as 65001
 neighbor 172.16.2.9 description spine-1
 neighbor 172.16.2.9 bfd
 neighbor 172.16.2.41 remote-as 65001
 neighbor 172.16.2.41 description spine-2
 neighbor 172.16.2.41 bfd
 !
 ! --- MetalLB peer-group (dynamic neighbors from k3s server loopbacks) ---
 neighbor METALLB peer-group
 neighbor METALLB remote-as external
 neighbor METALLB ebgp-multihop 2
 bgp listen range 10.0.5.0/24 peer-group METALLB
 !
 ! --- IPv4 Unicast ---
 address-family ipv4 unicast
  redistribute connected route-map CONNECTED-FILTER
  redistribute static
  maximum-paths 8
  neighbor 172.16.2.9 activate
  neighbor 172.16.2.9 allowas-in 1
  neighbor 172.16.2.41 activate
  neighbor 172.16.2.41 allowas-in 1
  neighbor METALLB activate
 exit-address-family
 !
 ! --- L2VPN EVPN ---
 address-family l2vpn evpn
  neighbor 172.16.2.9 activate
  neighbor 172.16.2.41 activate
  advertise-all-vni
 exit-address-family
exit
!
! --- BFD ---
bfd
 peer 172.16.2.9
  transmit-interval 1000
  receive-interval 1000
  detect-multiplier 3
 exit
 !
 peer 172.16.2.41
  transmit-interval 1000
  receive-interval 1000
  detect-multiplier 3
 exit
 !
exit
!
end
