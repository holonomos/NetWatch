!
! NetWatch — FRR configuration for leaf-1a
! Generated from topology.yml — DO NOT HAND-EDIT
!
frr version 10.4.1
frr defaults datacenter
hostname leaf-1a
log syslog informational
service integrated-vtysh-config
!
! --- Loopback ---
interface lo
 ip address 10.0.3.1/32
!
! --- Fabric interfaces ---
interface eth-spine-1
 ip address 172.16.2.2/30
 no shutdown
!
interface eth-spine-2
 ip address 172.16.2.34/30
 no shutdown
!
interface eth-srv-1-1
 ip address 172.16.3.1/30
 no shutdown
!
interface eth-srv-1-2
 ip address 172.16.3.9/30
 no shutdown
!
interface eth-srv-1-3
 ip address 172.16.3.17/30
 no shutdown
!
interface eth-srv-1-4
 ip address 172.16.3.25/30
 no shutdown
!
! --- Static routes to server loopbacks ---
ip route 10.0.4.1/32 172.16.3.2
ip route 10.0.4.2/32 172.16.3.10
ip route 10.0.4.3/32 172.16.3.18
ip route 10.0.4.4/32 172.16.3.26
!
! --- BGP ---
router bgp 65101
 bgp router-id 10.0.3.1
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 bgp bestpath as-path multipath-relax
 timers bgp 30 90
 !
 ! --- Neighbors ---
 neighbor 172.16.2.1 remote-as 65001
 neighbor 172.16.2.1 description spine-1
 neighbor 172.16.2.1 bfd
 neighbor 172.16.2.33 remote-as 65001
 neighbor 172.16.2.33 description spine-2
 neighbor 172.16.2.33 bfd
 !
 ! --- IPv4 Unicast ---
 address-family ipv4 unicast
  redistribute connected
  redistribute static
  maximum-paths 8
  neighbor 172.16.2.1 activate
  neighbor 172.16.2.1 allowas-in 1
  neighbor 172.16.2.33 activate
  neighbor 172.16.2.33 allowas-in 1
 exit-address-family
 !
 ! --- L2VPN EVPN ---
 address-family l2vpn evpn
  neighbor 172.16.2.1 activate
  neighbor 172.16.2.33 activate
  advertise-all-vni
 exit-address-family
exit
!
! --- BFD ---
bfd
 peer 172.16.2.1
  transmit-interval 1000
  receive-interval 1000
  detect-multiplier 3
 exit
 !
 peer 172.16.2.33
  transmit-interval 1000
  receive-interval 1000
  detect-multiplier 3
 exit
 !
exit
!
end
