!
! NetWatch — FRR configuration for border-1
! Generated from topology.yml — DO NOT HAND-EDIT
!
frr version 10.4.1
frr defaults datacenter
hostname border-1
log syslog informational
service integrated-vtysh-config
!
! --- Loopback ---
interface lo
 ip address 10.0.1.1/32
!
! --- Fabric interfaces ---
interface eth-bastion
 ip address 172.16.0.1/30
 no shutdown
!
interface eth-spine-1
 ip address 172.16.1.1/30
 no shutdown
!
interface eth-spine-2
 ip address 172.16.1.5/30
 no shutdown
!
! --- Static default route (north-south exit via bastion) ---
ip route 0.0.0.0/0 172.16.0.2
!
! --- BGP ---
router bgp 65000
 bgp router-id 10.0.1.1
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 bgp bestpath as-path multipath-relax
 timers bgp 30 90
 !
 ! --- Neighbors ---
 neighbor 172.16.1.2 remote-as 65001
 neighbor 172.16.1.2 description spine-1
 neighbor 172.16.1.2 bfd
 neighbor 172.16.1.6 remote-as 65001
 neighbor 172.16.1.6 description spine-2
 neighbor 172.16.1.6 bfd
 !
 ! --- IPv4 Unicast ---
 address-family ipv4 unicast
  redistribute connected
  redistribute static
  maximum-paths 8
  neighbor 172.16.1.2 activate
  neighbor 172.16.1.2 allowas-in 1
  neighbor 172.16.1.6 activate
  neighbor 172.16.1.6 allowas-in 1
 exit-address-family
 !
exit
!
! --- BFD ---
bfd
 peer 172.16.1.2
  transmit-interval 1000
  receive-interval 1000
  detect-multiplier 3
 exit
 !
 peer 172.16.1.6
  transmit-interval 1000
  receive-interval 1000
  detect-multiplier 3
 exit
 !
exit
!
end
