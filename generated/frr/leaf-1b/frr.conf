!
! NetWatch — FRR configuration for leaf-1b
! Generated from topology.yml — DO NOT HAND-EDIT
!
frr version 9.1
frr defaults datacenter
hostname leaf-1b
log syslog informational
service integrated-vtysh-config
!
! --- Loopback ---
interface lo
 ip address 10.0.3.2/32
!
! --- Fabric interfaces ---
interface eth-spine-1
 ip address 172.16.2.6/30
 no shutdown
!
interface eth-spine-2
 ip address 172.16.2.38/30
 no shutdown
!
interface eth-srv-1-1
 ip address 172.16.3.5/30
 no shutdown
!
interface eth-srv-1-2
 ip address 172.16.3.13/30
 no shutdown
!
interface eth-srv-1-3
 ip address 172.16.3.21/30
 no shutdown
!
interface eth-srv-1-4
 ip address 172.16.3.29/30
 no shutdown
!
! --- BGP ---
router bgp 65101
 bgp router-id 10.0.3.2
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 bgp bestpath as-path multipath-relax
 timers bgp 30 90
 !
 ! --- Neighbors ---
 neighbor 172.16.2.5 remote-as 65001
 neighbor 172.16.2.5 description spine-1
 neighbor 172.16.2.5 bfd
 neighbor 172.16.2.37 remote-as 65001
 neighbor 172.16.2.37 description spine-2
 neighbor 172.16.2.37 bfd
 !
 ! --- IPv4 Unicast ---
 address-family ipv4 unicast
  redistribute connected
  maximum-paths 8
  neighbor 172.16.2.5 activate
  neighbor 172.16.2.5 allowas-in 1
  neighbor 172.16.2.37 activate
  neighbor 172.16.2.37 allowas-in 1
 exit-address-family
 !
 ! --- L2VPN EVPN ---
 address-family l2vpn evpn
  neighbor 172.16.2.5 activate
  neighbor 172.16.2.37 activate
  advertise-all-vni
 exit-address-family
exit
!
! --- BFD ---
bfd
 peer 172.16.2.5
  transmit-interval 1000
  receive-interval 1000
  detect-multiplier 3
 exit
 !
 peer 172.16.2.37
  transmit-interval 1000
  receive-interval 1000
  detect-multiplier 3
 exit
 !
exit
!
end
