!
! NetWatch — FRR configuration for leaf-3b
! Generated from topology.yml — DO NOT HAND-EDIT
!
frr defaults datacenter
hostname leaf-3b
log syslog informational
service integrated-vtysh-config
!
! --- Loopback ---
interface lo
 ip address 10.0.3.6/32
!
! --- Fabric interfaces ---
interface eth-spine-1
 ip address 172.16.2.22/30
 no shutdown
!
interface eth-spine-2
 ip address 172.16.2.54/30
 no shutdown
!
interface eth-srv-3-1
 ip address 172.16.5.5/30
 no shutdown
!
interface eth-srv-3-2
 ip address 172.16.5.13/30
 no shutdown
!
interface eth-srv-3-3
 ip address 172.16.5.21/30
 no shutdown
!
interface eth-srv-3-4
 ip address 172.16.5.29/30
 no shutdown
!
! --- Static routes to server loopbacks ---
ip route 10.0.6.1/32 172.16.5.6
ip route 10.0.6.2/32 172.16.5.14
ip route 10.0.6.3/32 172.16.5.22
ip route 10.0.6.4/32 172.16.5.30
!
! --- Prefix list: deny management subnet from redistribution ---
ip prefix-list CONNECTED-FILTER seq 5 deny 192.168.0.0/24 le 32
ip prefix-list CONNECTED-FILTER seq 100 permit 0.0.0.0/0 le 32
!
! --- Route map for redistribute filtering ---
route-map CONNECTED-FILTER permit 10
 match ip address prefix-list CONNECTED-FILTER
exit
!
! --- BGP ---
router bgp 65103
 bgp router-id 10.0.3.6
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 bgp bestpath as-path multipath-relax
 timers bgp 30 90
 !
 ! --- Neighbors ---
 neighbor 172.16.2.21 remote-as 65001
 neighbor 172.16.2.21 description spine-1
 neighbor 172.16.2.21 bfd
 neighbor 172.16.2.53 remote-as 65001
 neighbor 172.16.2.53 description spine-2
 neighbor 172.16.2.53 bfd
 !
 ! --- IPv4 Unicast ---
 address-family ipv4 unicast
  redistribute connected route-map CONNECTED-FILTER
  redistribute static
  maximum-paths 8
  neighbor 172.16.2.21 activate
  neighbor 172.16.2.21 allowas-in 1
  neighbor 172.16.2.53 activate
  neighbor 172.16.2.53 allowas-in 1
 exit-address-family
 !
 ! --- L2VPN EVPN ---
 address-family l2vpn evpn
  neighbor 172.16.2.21 activate
  neighbor 172.16.2.53 activate
  advertise-all-vni
 exit-address-family
exit
!
! --- BFD ---
bfd
 peer 172.16.2.21
  transmit-interval 1000
  receive-interval 1000
  detect-multiplier 3
 exit
 !
 peer 172.16.2.53
  transmit-interval 1000
  receive-interval 1000
  detect-multiplier 3
 exit
 !
exit
!
end
