!
! NetWatch — FRR configuration for border-2
! Generated from topology.yml — DO NOT HAND-EDIT
!
frr defaults datacenter
hostname border-2
log syslog informational
service integrated-vtysh-config
!
! --- Loopback ---
interface lo
 ip address 10.0.1.2/32
!
! --- Fabric interfaces ---
interface eth-bastion
 ip address 172.16.0.5/30
 no shutdown
!
interface eth-spine-1
 ip address 172.16.1.9/30
 no shutdown
!
interface eth-spine-2
 ip address 172.16.1.13/30
 no shutdown
!
! --- Static default route (north-south exit via bastion) ---
ip route 0.0.0.0/0 172.16.0.6
!
! --- Prefix list: deny management subnet from redistribution ---
ip prefix-list CONNECTED-FILTER seq 5 deny 192.168.0.0/24 le 32
ip prefix-list CONNECTED-FILTER seq 100 permit 0.0.0.0/0 le 32
!
! --- Route map for redistribute filtering ---
route-map CONNECTED-FILTER permit 10
 match ip address prefix-list CONNECTED-FILTER
exit
!
! --- BGP ---
router bgp 65000
 bgp router-id 10.0.1.2
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 bgp bestpath as-path multipath-relax
 timers bgp 30 90
 !
 ! --- Neighbors ---
 neighbor 172.16.1.10 remote-as 65001
 neighbor 172.16.1.10 description spine-1
 neighbor 172.16.1.10 bfd
 neighbor 172.16.1.14 remote-as 65001
 neighbor 172.16.1.14 description spine-2
 neighbor 172.16.1.14 bfd
 !
 ! --- IPv4 Unicast ---
 address-family ipv4 unicast
  redistribute connected route-map CONNECTED-FILTER
  redistribute static
  maximum-paths 8
  neighbor 172.16.1.10 activate
  neighbor 172.16.1.10 allowas-in 1
  neighbor 172.16.1.14 activate
  neighbor 172.16.1.14 allowas-in 1
 exit-address-family
 !
exit
!
! --- BFD ---
bfd
 peer 172.16.1.10
  transmit-interval 1000
  receive-interval 1000
  detect-multiplier 3
 exit
 !
 peer 172.16.1.14
  transmit-interval 1000
  receive-interval 1000
  detect-multiplier 3
 exit
 !
exit
!
end
