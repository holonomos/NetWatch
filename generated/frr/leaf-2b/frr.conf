!
! NetWatch — FRR configuration for leaf-2b
! Generated from topology.yml — DO NOT HAND-EDIT
!
frr version 9.1
frr defaults datacenter
hostname leaf-2b
log syslog informational
service integrated-vtysh-config
!
! --- Loopback ---
interface lo
 ip address 10.0.3.4/32
!
! --- Fabric interfaces ---
interface eth-spine-1
 ip address 172.16.2.14/30
 no shutdown
!
interface eth-spine-2
 ip address 172.16.2.46/30
 no shutdown
!
interface eth-srv-2-1
 ip address 172.16.4.5/30
 no shutdown
!
interface eth-srv-2-2
 ip address 172.16.4.13/30
 no shutdown
!
interface eth-srv-2-3
 ip address 172.16.4.21/30
 no shutdown
!
interface eth-srv-2-4
 ip address 172.16.4.29/30
 no shutdown
!
! --- BGP ---
router bgp 65102
 bgp router-id 10.0.3.4
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 bgp bestpath as-path multipath-relax
 timers bgp 30 90
 !
 ! --- Neighbors ---
 neighbor 172.16.2.13 remote-as 65001
 neighbor 172.16.2.13 description spine-1
 neighbor 172.16.2.13 bfd
 neighbor 172.16.2.45 remote-as 65001
 neighbor 172.16.2.45 description spine-2
 neighbor 172.16.2.45 bfd
 !
 ! --- IPv4 Unicast ---
 address-family ipv4 unicast
  redistribute connected
  maximum-paths 8
  neighbor 172.16.2.13 activate
  neighbor 172.16.2.13 allowas-in 1
  neighbor 172.16.2.45 activate
  neighbor 172.16.2.45 allowas-in 1
 exit-address-family
 !
 ! --- L2VPN EVPN ---
 address-family l2vpn evpn
  neighbor 172.16.2.13 activate
  neighbor 172.16.2.45 activate
  advertise-all-vni
 exit-address-family
exit
!
! --- BFD ---
bfd
 peer 172.16.2.13
  transmit-interval 1000
  receive-interval 1000
  detect-multiplier 3
 exit
 !
 peer 172.16.2.45
  transmit-interval 1000
  receive-interval 1000
  detect-multiplier 3
 exit
 !
exit
!
end
