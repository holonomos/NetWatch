# NetWatch — Prometheus configuration
# Generated from topology.yml — DO NOT HAND-EDIT
#
# Scrape targets:
#   - 12 FRR containers on port 9101 (FRR native exporter)
#   - 18 VMs on port 9100 (node_exporter)

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # --- FRR routing containers (native Prometheus exporter) ---
  - job_name: 'frr'
    static_configs:
      - targets: ['192.168.0.10:9101']
        labels:
          instance: 'border-1'
          role: 'border'
      - targets: ['192.168.0.11:9101']
        labels:
          instance: 'border-2'
          role: 'border'
      - targets: ['192.168.0.30:9101']
        labels:
          instance: 'leaf-1a'
          role: 'leaf'
          rack: 'rack-1'
      - targets: ['192.168.0.31:9101']
        labels:
          instance: 'leaf-1b'
          role: 'leaf'
          rack: 'rack-1'
      - targets: ['192.168.0.32:9101']
        labels:
          instance: 'leaf-2a'
          role: 'leaf'
          rack: 'rack-2'
      - targets: ['192.168.0.33:9101']
        labels:
          instance: 'leaf-2b'
          role: 'leaf'
          rack: 'rack-2'
      - targets: ['192.168.0.34:9101']
