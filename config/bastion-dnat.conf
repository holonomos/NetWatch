# NetWatch — Bastion DNAT Port Forwarding
# =========================================
# For non-k3s services running directly on server VMs.
# k3s services use MetalLB (no DNAT needed).
#
# Format: <external_port> <internal_ip> <internal_port> [protocol]
#   protocol defaults to tcp if omitted
#
# Examples:
#   5432 10.0.5.1 5432 tcp    # PostgreSQL on srv-2-1 (loopback)
#   6379 10.0.6.2 6379 tcp    # Redis on srv-3-2 (loopback)
#   8080 10.0.4.1 80   tcp    # Web app on srv-1-1 (loopback)
#   9090 192.168.0.3 9090 tcp # Prometheus on mgmt (direct)
#
# Apply: bash scripts/bastion/apply-dnat.sh
# =========================================

# --- Default: Grafana + Prometheus accessible from host via bastion ---
3000 192.168.0.3 3000 tcp
9090 192.168.0.3 9090 tcp
3100 192.168.0.3 3100 tcp
