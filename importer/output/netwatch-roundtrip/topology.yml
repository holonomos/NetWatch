  cidr: 192.168.0.0/24
  gateway: 192.168.0.1
  dhcp_server: obs
  dns_domain: netwatch.lab
observability:
  prometheus:
    host: obs
    port: 9090
    scrape_interval_s: 15
    targets:
      frr_nodes:
        port: 9342
        nodes:
        - border-1
        - border-2
        - spine-1
        - spine-2
        - leaf-1a
        - leaf-1b
        - leaf-2a
        - leaf-2b
        - leaf-3a
        - leaf-3b
        - leaf-4a
        - leaf-4b
      vm_nodes:
        port: 9100
        nodes:
        - bastion
        - mgmt
        - obs
  grafana:
