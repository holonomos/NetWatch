 exit
 !
 peer 172.16.2.14
  transmit-interval 1000
  receive-interval 1000
  detect-multiplier 3
 exit
 !
 peer 172.16.2.18
  transmit-interval 1000
  receive-interval 1000
  detect-multiplier 3
 exit
 !
 peer 172.16.2.22
  transmit-interval 1000
  receive-interval 1000
  detect-multiplier 3
 exit
 !
 peer 172.16.2.26
  transmit-interval 1000
  receive-interval 1000
  detect-multiplier 3
 exit
 !
 peer 172.16.2.30
  transmit-interval 1000
  receive-interval 1000
  detect-multiplier 3
 exit
 !
exit
