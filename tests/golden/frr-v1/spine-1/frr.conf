!
! NetWatch — FRR configuration for spine-1
! Generated from topology.yml — DO NOT HAND-EDIT
!
frr defaults datacenter
hostname spine-1
log syslog informational
service integrated-vtysh-config
!
! --- Loopback ---
interface lo
 ip address 10.0.2.1/32
!
! --- Fabric interfaces ---
interface eth-border-1
 ip address 172.16.1.2/30
 no shutdown
!
interface eth-border-2
 ip address 172.16.1.10/30
 no shutdown
!
interface eth-leaf-1a
 ip address 172.16.2.1/30
 no shutdown
!
interface eth-leaf-1b
 ip address 172.16.2.5/30
 no shutdown
!
interface eth-leaf-2a
 ip address 172.16.2.9/30
 no shutdown
!
interface eth-leaf-2b
 ip address 172.16.2.13/30
 no shutdown
!
interface eth-leaf-3a
 ip address 172.16.2.17/30
 no shutdown
!
interface eth-leaf-3b
 ip address 172.16.2.21/30
 no shutdown
!
interface eth-leaf-4a
 ip address 172.16.2.25/30
 no shutdown
!
interface eth-leaf-4b
 ip address 172.16.2.29/30
 no shutdown
!
! --- Prefix list: deny management subnet from redistribution ---
ip prefix-list CONNECTED-FILTER seq 5 deny 192.168.0.0/24 le 32
ip prefix-list CONNECTED-FILTER seq 100 permit 0.0.0.0/0 le 32
!
! --- Route map for redistribute filtering ---
route-map CONNECTED-FILTER permit 10
 match ip address prefix-list CONNECTED-FILTER
exit
!
! --- BGP ---
router bgp 65001
 bgp router-id 10.0.2.1
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 bgp bestpath as-path multipath-relax
 timers bgp 30 90
 !
 ! --- Neighbors ---
 neighbor 172.16.1.1 remote-as 65000
 neighbor 172.16.1.1 description border-1
 neighbor 172.16.1.1 bfd
 neighbor 172.16.1.9 remote-as 65000
 neighbor 172.16.1.9 description border-2
 neighbor 172.16.1.9 bfd
 neighbor 172.16.2.2 remote-as 65101
 neighbor 172.16.2.2 description leaf-1a
 neighbor 172.16.2.2 bfd
 neighbor 172.16.2.6 remote-as 65101
 neighbor 172.16.2.6 description leaf-1b
 neighbor 172.16.2.6 bfd
 neighbor 172.16.2.10 remote-as 65102
 neighbor 172.16.2.10 description leaf-2a
 neighbor 172.16.2.10 bfd
 neighbor 172.16.2.14 remote-as 65102
 neighbor 172.16.2.14 description leaf-2b
 neighbor 172.16.2.14 bfd
 neighbor 172.16.2.18 remote-as 65103
 neighbor 172.16.2.18 description leaf-3a
 neighbor 172.16.2.18 bfd
 neighbor 172.16.2.22 remote-as 65103
 neighbor 172.16.2.22 description leaf-3b
 neighbor 172.16.2.22 bfd
 neighbor 172.16.2.26 remote-as 65104
 neighbor 172.16.2.26 description leaf-4a
 neighbor 172.16.2.26 bfd
 neighbor 172.16.2.30 remote-as 65104
 neighbor 172.16.2.30 description leaf-4b
 neighbor 172.16.2.30 bfd
 !
 ! --- IPv4 Unicast ---
 address-family ipv4 unicast
  redistribute connected route-map CONNECTED-FILTER
  maximum-paths 8
  neighbor 172.16.1.1 activate
  neighbor 172.16.1.9 activate
  neighbor 172.16.2.2 activate
  neighbor 172.16.2.6 activate
  neighbor 172.16.2.10 activate
  neighbor 172.16.2.14 activate
  neighbor 172.16.2.18 activate
  neighbor 172.16.2.22 activate
  neighbor 172.16.2.26 activate
  neighbor 172.16.2.30 activate
 exit-address-family
 !
 ! --- L2VPN EVPN ---
 address-family l2vpn evpn
  neighbor 172.16.1.1 activate
  neighbor 172.16.1.1 next-hop-unchanged
  neighbor 172.16.1.9 activate
  neighbor 172.16.1.9 next-hop-unchanged
  neighbor 172.16.2.2 activate
  neighbor 172.16.2.2 next-hop-unchanged
  neighbor 172.16.2.6 activate
  neighbor 172.16.2.6 next-hop-unchanged
  neighbor 172.16.2.10 activate
  neighbor 172.16.2.10 next-hop-unchanged
  neighbor 172.16.2.14 activate
  neighbor 172.16.2.14 next-hop-unchanged
  neighbor 172.16.2.18 activate
  neighbor 172.16.2.18 next-hop-unchanged
  neighbor 172.16.2.22 activate
  neighbor 172.16.2.22 next-hop-unchanged
  neighbor 172.16.2.26 activate
  neighbor 172.16.2.26 next-hop-unchanged
  neighbor 172.16.2.30 activate
  neighbor 172.16.2.30 next-hop-unchanged
 exit-address-family
exit
!
! --- BFD ---
bfd
 peer 172.16.1.1
  transmit-interval 1000
  receive-interval 1000
  detect-multiplier 3
 exit
 !
 peer 172.16.1.9
  transmit-interval 1000
  receive-interval 1000
