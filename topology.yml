    - name: mgmt
      type: fedora-vm
      role: mgmt
      vcpu: 2
      memory_mb: 2048
      mgmt_ip: "192.168.0.3"
      metrics_port: 9100
      services:
        - prometheus:  9090
        - grafana:     3000
        - loki:        3100
        - dnsmasq:     53
        - chrony:      123
      description: "Observability stack, DHCP/DNS, NTP"

# ============================================================================
# FABRIC LINKS
# ============================================================================
# Every point-to-point link in the routed fabric.
# Each link maps to one Linux bridge with two veth endpoints.
#
# Convention:
#   - a_ip: higher-tier node (border > spine > leaf > server)
#   - b_ip: lower-tier node
#   - subnet: /30 allocation from the appropriate pool
#
# Total: 2 border-bastion + 4 border-spine + 16 spine-leaf + 32 leaf-server = 54 links
# BGP sessions: 4 border-spine + 16 spine-leaf = 20 sessions (border-bastion uses static routes)

links:

  # --- Border <-> Bastion (2 links) ----------------------------------------
  # North-south exit path. Static routes on borders, no BGP.
  # Bastion is a VM (NAT gateway), not an FRR container.
  border_bastion:
    - a: border-1
      b: bastion
      subnet: "172.16.0.0/30"
      a_ip: "172.16.0.1"
      b_ip: "172.16.0.2"

    - a: border-2
      b: bastion
      subnet: "172.16.0.4/30"
      a_ip: "172.16.0.5"
      b_ip: "172.16.0.6"

  # --- Border <-> Spine (4 links) ------------------------------------------
  border_spine:
    - a: border-1
      b: spine-1
      subnet: "172.16.1.0/30"
      a_ip: "172.16.1.1"
      b_ip: "172.16.1.2"

    - a: border-1
      b: spine-2
      subnet: "172.16.1.4/30"
      a_ip: "172.16.1.5"
      b_ip: "172.16.1.6"

    - a: border-2
      b: spine-1
      subnet: "172.16.1.8/30"
      a_ip: "172.16.1.9"
      b_ip: "172.16.1.10"

    - a: border-2
      b: spine-2
      subnet: "172.16.1.12/30"
      a_ip: "172.16.1.13"
      b_ip: "172.16.1.14"

  # --- Spine <-> Leaf (16 links) -------------------------------------------
  spine_leaf:
    # spine-1 to all 8 leafs
    - { a: spine-1, b: leaf-1a, subnet: "172.16.2.0/30",  a_ip: "172.16.2.1",  b_ip: "172.16.2.2"  }
    - { a: spine-1, b: leaf-1b, subnet: "172.16.2.4/30",  a_ip: "172.16.2.5",  b_ip: "172.16.2.6"  }
    - { a: spine-1, b: leaf-2a, subnet: "172.16.2.8/30",  a_ip: "172.16.2.9",  b_ip: "172.16.2.10" }
    - { a: spine-1, b: leaf-2b, subnet: "172.16.2.12/30", a_ip: "172.16.2.13", b_ip: "172.16.2.14" }
    - { a: spine-1, b: leaf-3a, subnet: "172.16.2.16/30", a_ip: "172.16.2.17", b_ip: "172.16.2.18" }
    - { a: spine-1, b: leaf-3b, subnet: "172.16.2.20/30", a_ip: "172.16.2.21", b_ip: "172.16.2.22" }
    - { a: spine-1, b: leaf-4a, subnet: "172.16.2.24/30", a_ip: "172.16.2.25", b_ip: "172.16.2.26" }
    - { a: spine-1, b: leaf-4b, subnet: "172.16.2.28/30", a_ip: "172.16.2.29", b_ip: "172.16.2.30" }

    # spine-2 to all 8 leafs
    - { a: spine-2, b: leaf-1a, subnet: "172.16.2.32/30", a_ip: "172.16.2.33", b_ip: "172.16.2.34" }
    - { a: spine-2, b: leaf-1b, subnet: "172.16.2.36/30", a_ip: "172.16.2.37", b_ip: "172.16.2.38" }
    - { a: spine-2, b: leaf-2a, subnet: "172.16.2.40/30", a_ip: "172.16.2.41", b_ip: "172.16.2.42" }
    - { a: spine-2, b: leaf-2b, subnet: "172.16.2.44/30", a_ip: "172.16.2.45", b_ip: "172.16.2.46" }
    - { a: spine-2, b: leaf-3a, subnet: "172.16.2.48/30", a_ip: "172.16.2.49", b_ip: "172.16.2.50" }
    - { a: spine-2, b: leaf-3b, subnet: "172.16.2.52/30", a_ip: "172.16.2.53", b_ip: "172.16.2.54" }
    - { a: spine-2, b: leaf-4a, subnet: "172.16.2.56/30", a_ip: "172.16.2.57", b_ip: "172.16.2.58" }
    - { a: spine-2, b: leaf-4b, subnet: "172.16.2.60/30", a_ip: "172.16.2.61", b_ip: "172.16.2.62" }

  # --- Leaf <-> Server (32 links) ------------------------------------------
  # Each server dual-homed: one link to leaf-Xa, one link to leaf-Xb.
  # Servers use ECMP default route via both leafs.
  # Leafs advertise connected /30 subnets into BGP.
  leaf_server:

    # Rack 1 (172.16.3.0/24)
    - { a: leaf-1a, b: srv-1-1, subnet: "172.16.3.0/30",  a_ip: "172.16.3.1",  b_ip: "172.16.3.2"  }
    - { a: leaf-1b, b: srv-1-1, subnet: "172.16.3.4/30",  a_ip: "172.16.3.5",  b_ip: "172.16.3.6"  }
    - { a: leaf-1a, b: srv-1-2, subnet: "172.16.3.8/30",  a_ip: "172.16.3.9",  b_ip: "172.16.3.10" }
    - { a: leaf-1b, b: srv-1-2, subnet: "172.16.3.12/30", a_ip: "172.16.3.13", b_ip: "172.16.3.14" }
    - { a: leaf-1a, b: srv-1-3, subnet: "172.16.3.16/30", a_ip: "172.16.3.17", b_ip: "172.16.3.18" }
    - { a: leaf-1b, b: srv-1-3, subnet: "172.16.3.20/30", a_ip: "172.16.3.21", b_ip: "172.16.3.22" }
    - { a: leaf-1a, b: srv-1-4, subnet: "172.16.3.24/30", a_ip: "172.16.3.25", b_ip: "172.16.3.26" }
    - { a: leaf-1b, b: srv-1-4, subnet: "172.16.3.28/30", a_ip: "172.16.3.29", b_ip: "172.16.3.30" }

    # Rack 2 (172.16.4.0/24)
    - { a: leaf-2a, b: srv-2-1, subnet: "172.16.4.0/30",  a_ip: "172.16.4.1",  b_ip: "172.16.4.2"  }
    - { a: leaf-2b, b: srv-2-1, subnet: "172.16.4.4/30",  a_ip: "172.16.4.5",  b_ip: "172.16.4.6"  }
    - { a: leaf-2a, b: srv-2-2, subnet: "172.16.4.8/30",  a_ip: "172.16.4.9",  b_ip: "172.16.4.10" }
    - { a: leaf-2b, b: srv-2-2, subnet: "172.16.4.12/30", a_ip: "172.16.4.13", b_ip: "172.16.4.14" }
    - { a: leaf-2a, b: srv-2-3, subnet: "172.16.4.16/30", a_ip: "172.16.4.17", b_ip: "172.16.4.18" }
    - { a: leaf-2b, b: srv-2-3, subnet: "172.16.4.20/30", a_ip: "172.16.4.21", b_ip: "172.16.4.22" }
    - { a: leaf-2a, b: srv-2-4, subnet: "172.16.4.24/30", a_ip: "172.16.4.25", b_ip: "172.16.4.26" }
    - { a: leaf-2b, b: srv-2-4, subnet: "172.16.4.28/30", a_ip: "172.16.4.29", b_ip: "172.16.4.30" }

    # Rack 3 (172.16.5.0/24)
    - { a: leaf-3a, b: srv-3-1, subnet: "172.16.5.0/30",  a_ip: "172.16.5.1",  b_ip: "172.16.5.2"  }
    - { a: leaf-3b, b: srv-3-1, subnet: "172.16.5.4/30",  a_ip: "172.16.5.5",  b_ip: "172.16.5.6"  }
    - { a: leaf-3a, b: srv-3-2, subnet: "172.16.5.8/30",  a_ip: "172.16.5.9",  b_ip: "172.16.5.10" }
    - { a: leaf-3b, b: srv-3-2, subnet: "172.16.5.12/30", a_ip: "172.16.5.13", b_ip: "172.16.5.14" }
    - { a: leaf-3a, b: srv-3-3, subnet: "172.16.5.16/30", a_ip: "172.16.5.17", b_ip: "172.16.5.18" }
    - { a: leaf-3b, b: srv-3-3, subnet: "172.16.5.20/30", a_ip: "172.16.5.21", b_ip: "172.16.5.22" }
    - { a: leaf-3a, b: srv-3-4, subnet: "172.16.5.24/30", a_ip: "172.16.5.25", b_ip: "172.16.5.26" }
    - { a: leaf-3b, b: srv-3-4, subnet: "172.16.5.28/30", a_ip: "172.16.5.29", b_ip: "172.16.5.30" }

    # Rack 4 (172.16.6.0/24)
    - { a: leaf-4a, b: srv-4-1, subnet: "172.16.6.0/30",  a_ip: "172.16.6.1",  b_ip: "172.16.6.2"  }
    - { a: leaf-4b, b: srv-4-1, subnet: "172.16.6.4/30",  a_ip: "172.16.6.5",  b_ip: "172.16.6.6"  }
    - { a: leaf-4a, b: srv-4-2, subnet: "172.16.6.8/30",  a_ip: "172.16.6.9",  b_ip: "172.16.6.10" }
    - { a: leaf-4b, b: srv-4-2, subnet: "172.16.6.12/30", a_ip: "172.16.6.13", b_ip: "172.16.6.14" }
    - { a: leaf-4a, b: srv-4-3, subnet: "172.16.6.16/30", a_ip: "172.16.6.17", b_ip: "172.16.6.18" }
    - { a: leaf-4b, b: srv-4-3, subnet: "172.16.6.20/30", a_ip: "172.16.6.21", b_ip: "172.16.6.22" }
    - { a: leaf-4a, b: srv-4-4, subnet: "172.16.6.24/30", a_ip: "172.16.6.25", b_ip: "172.16.6.26" }
    - { a: leaf-4b, b: srv-4-4, subnet: "172.16.6.28/30", a_ip: "172.16.6.29", b_ip: "172.16.6.30" }

# ============================================================================
# MANAGEMENT NETWORK
# ============================================================================
# Single Linux bridge (br-mgmt) connecting all 30 nodes for OOB access.
# Isolated from the routed fabric. DHCP/DNS served by mgmt node.

management:
  bridge: virbr2
  cidr: "192.168.0.0/24"
  gateway: "192.168.0.1"        # host interface on br-mgmt
  dhcp_server: mgmt             # dnsmasq runs here
  dns_domain: "netwatch.lab"

# ============================================================================
# OBSERVABILITY
# ============================================================================

observability:
  prometheus:
    host: mgmt
    port: 9090
    scrape_interval_s: 15
    targets:
      frr_nodes:
        port: 9342              # frr_exporter
        nodes:
          - border-1
          - border-2
          - spine-1
          - spine-2
          - leaf-1a
          - leaf-1b
          - leaf-2a
          - leaf-2b
          - leaf-3a
          - leaf-3b
          - leaf-4a
          - leaf-4b
      vm_nodes:
        port: 9100              # node_exporter
        nodes:
          - srv-1-1
          - srv-1-2
          - srv-1-3
          - srv-1-4
          - srv-2-1
          - srv-2-2
          - srv-2-3
          - srv-2-4
          - srv-3-1
          - srv-3-2
          - srv-3-3
          - srv-3-4
          - srv-4-1
          - srv-4-2
          - srv-4-3
          - srv-4-4
          - bastion
          - mgmt

  grafana:
    host: mgmt
    port: 3000
    dashboards:
      - fabric-overview
      - bgp-status
      - node-detail
      - interface-counters
      - chaos-events
      - evpn-vxlan

  loki:
    host: mgmt
    port: 3100
    description: "rsyslog from all nodes -> Loki -> Grafana LogQL"

# ============================================================================
# EVPN / VXLAN (OVERLAY - LATE PHASE)
# ============================================================================
# Implemented after the underlay is proven (post P6).
# Leafs are VTEPs. MP-BGP L2VPN address family.

evpn:
  enabled: true
  vni_base: 10000
  vtep_nodes:
    - leaf-1a
    - leaf-1b
    - leaf-2a
    - leaf-2b
    - leaf-3a
    - leaf-3b
    - leaf-4a
    - leaf-4b
  description: "VNI-per-tenant overlay. Leaf VTEPs. Implemented in Phase 7."

# ============================================================================
# VALIDATION (ADDON LAYER - NOT CORE ARCHITECTURE)
# ============================================================================

validation:
  infrastructure_chaos:
    tool: "tc netem + custom scripts"
    phase: "P6"
    scenarios:
      - link-down
      - link-flap
      - latency-injection
      - packet-loss
      - packet-corruption
      - rack-partition
      - node-kill

  workload_chaos:
    tool: "chaos-mesh"
    phase: "P7"
    install: "helm install chaos-mesh chaos-mesh/chaos-mesh -n chaos-mesh"
    scenarios:
      - pod-kill
      - pod-failure
      - network-partition
      - network-delay
      - node-drain

  success_criteria:
    workload: "replicated nginx (3+ replicas across racks)"
    availability: ">99% over 10-minute chaos run"
    max_outage: "<3 seconds"
    description: >
      Chaos Mesh runs unmodified against the k3s validation layer.
      If the chaos tooling cannot distinguish the emulated fabric
      from production infrastructure, the project succeeds.
