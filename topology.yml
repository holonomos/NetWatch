---
# ============================================================================
# NetWatch Topology Definition
# ============================================================================
# This file is the SINGLE SOURCE OF TRUTH for the entire fabric.
# The config generator reads this to produce all FRR, Prometheus, DHCP,
# DNS, and provisioning configurations.
#
# Change this file, regenerate, get a different fabric.
# Never hand-edit generated configs.
# ============================================================================

project:
  name: netwatch
  version: "1.0"
  description: >
    30-node hyperscale data-center lab emulator built around a
    12-node 3-tier L3 Clos routing fabric. All VMs, no Docker.

# ============================================================================
# CONTROL-PLANE TIMERS
# ============================================================================
# All control-plane timers are 10x dilated to eliminate false BFD flaps
# from CPU scheduling jitter on shared laptop hardware.
# Behavioral state machines are identical to production.
# Data-plane metrics are untouched.

timers:
  dilation_factor: 10

  bfd:
    tx_interval_ms: 1000        # production equivalent: 100 ms
    rx_interval_ms: 1000        # production equivalent: 100 ms
    detect_multiplier: 3        # detection time: 3 s (prod: 300 ms)

  bgp:
    keepalive_s: 30             # production equivalent: 3 s
    holdtime_s: 90              # production equivalent: 9 s

# ============================================================================
# ASN ASSIGNMENTS
# ============================================================================
# 6-ASN model. eBGP everywhere, no iBGP.
# ASN-per-rack maps directly to failure domains.

asn:
  border: 65000
  spine: 65001
  racks:
    rack-1: 65101
    rack-2: 65102
    rack-3: 65103
    rack-4: 65104

# ============================================================================
# ADDRESS SPACE
# ============================================================================
# Three non-overlapping address families, each with a distinct purpose.
#
#   10.0.0.0/16      Loopbacks   - router-ID, SSH target, scrape target
#   172.16.0.0/16    Fabric P2P  - /30 subnets, one per link
#   192.168.0.0/24   Management  - OOB, isolated from routed fabric

addressing:
  loopback:
    cidr: "10.0.0.0/16"
    description: >
      Advertised into BGP. Used as router-ID and scrape target.
      10.0.1.x = border, 10.0.2.x = spine, 10.0.3.x = leaf,
      10.0.4.x = rack-1 servers, 10.0.5.x = rack-2 servers,
      10.0.6.x = rack-3 servers, 10.0.7.x = rack-4 servers.

  fabric:
    cidr: "172.16.0.0/16"
    description: "Point-to-point /30 subnets. Connected routes only."
    pools:
      border_bastion: "172.16.0.0/24"
      border_spine: "172.16.1.0/24"
      spine_leaf: "172.16.2.0/24"
      leaf_server_rack1: "172.16.3.0/24"
      leaf_server_rack2: "172.16.4.0/24"
      leaf_server_rack3: "172.16.5.0/24"
      leaf_server_rack4: "172.16.6.0/24"

  services:
    cidr: "10.100.0.0/24"
    description: >
      MetalLB external IP pool. Assigned to k3s LoadBalancer services.
      Announced as /32 routes via BGP from MetalLB speakers to leaf switches.
      Reachable from host via: ip route add 10.100.0.0/24 via 192.168.0.2

  management:
    cidr: "192.168.0.0/24"
    gateway: "192.168.0.1"
    description: "OOB management. Isolated from fabric. DHCP served by mgmt node."

# ============================================================================
# NODES
# ============================================================================
# 30 total: 12 FRR VMs + 16 server VMs + 1 bastion VM + 1 mgmt VM
# All VMs use the netwatch-golden box (Fedora Cloud + FRR 10.4.1). No Docker.
#
# Convention:
#   - FRR VMs: Fedora, 256 MB, FRR enabled at provision time, fabric NICs hot-plugged
#   - Server VMs: Fedora Cloud, KVM/Vagrant, KSM memory deduplication
#   - IP assignment: .1 = higher-tier endpoint, .2 = lower-tier endpoint

nodes:

  # --- Border routers (AS 65000) -------------------------------------------
  borders:
    - name: border-1
      type: frr-vm
      role: border
      asn: 65000
      vcpu: 1
      memory_mb: 256
      loopback: "10.0.1.1/32"
      mgmt_ip: "192.168.0.10"
      metrics_port: 9342          # frr_exporter

    - name: border-2
      type: frr-vm
      role: border
      asn: 65000
      vcpu: 1
      memory_mb: 256
      loopback: "10.0.1.2/32"
      mgmt_ip: "192.168.0.11"
      metrics_port: 9342

  # --- Spine switches (AS 65001) -------------------------------------------
  spines:
    - name: spine-1
      type: frr-vm
      role: spine
      asn: 65001
      vcpu: 1
      memory_mb: 256
      loopback: "10.0.2.1/32"
      mgmt_ip: "192.168.0.20"
      metrics_port: 9342

    - name: spine-2
      type: frr-vm
      role: spine
      asn: 65001
      vcpu: 1
      memory_mb: 256
      loopback: "10.0.2.2/32"
      mgmt_ip: "192.168.0.21"
      metrics_port: 9342

  # --- Leaf switches (ASN per rack) ----------------------------------------
  leafs:
    # Rack 1 - AS 65101
    - name: leaf-1a
      type: frr-vm
      role: leaf
      rack: rack-1
      asn: 65101
      vcpu: 1
      memory_mb: 256
      loopback: "10.0.3.1/32"
      mgmt_ip: "192.168.0.30"
      metrics_port: 9342
      evpn_vtep: true

    - name: leaf-1b
      type: frr-vm
      role: leaf
      rack: rack-1
      asn: 65101
      vcpu: 1
      memory_mb: 256
      loopback: "10.0.3.2/32"
      mgmt_ip: "192.168.0.31"
      metrics_port: 9342
      evpn_vtep: true

    # Rack 2 - AS 65102
    - name: leaf-2a
      type: frr-vm
      role: leaf
      rack: rack-2
      asn: 65102
      vcpu: 1
      memory_mb: 256
      loopback: "10.0.3.3/32"
      mgmt_ip: "192.168.0.32"
      metrics_port: 9342
      evpn_vtep: true

    - name: leaf-2b
      type: frr-vm
      role: leaf
      rack: rack-2
      asn: 65102
      vcpu: 1
      memory_mb: 256
      loopback: "10.0.3.4/32"
      mgmt_ip: "192.168.0.33"
      metrics_port: 9342
      evpn_vtep: true

    # Rack 3 - AS 65103
    - name: leaf-3a
      type: frr-vm
      role: leaf
      rack: rack-3
      asn: 65103
      vcpu: 1
      memory_mb: 256
      loopback: "10.0.3.5/32"
      mgmt_ip: "192.168.0.34"
      metrics_port: 9342
      evpn_vtep: true

    - name: leaf-3b
      type: frr-vm
      role: leaf
      rack: rack-3
      asn: 65103
      vcpu: 1
      memory_mb: 256
      loopback: "10.0.3.6/32"
      mgmt_ip: "192.168.0.35"
      metrics_port: 9342
      evpn_vtep: true

    # Rack 4 - AS 65104
    - name: leaf-4a
      type: frr-vm
      role: leaf
      rack: rack-4
      asn: 65104
      vcpu: 1
      memory_mb: 256
      loopback: "10.0.3.7/32"
      mgmt_ip: "192.168.0.36"
      metrics_port: 9342
      evpn_vtep: true

    - name: leaf-4b
      type: frr-vm
      role: leaf
      rack: rack-4
      asn: 65104
      vcpu: 1
      memory_mb: 256
      loopback: "10.0.3.8/32"
      mgmt_ip: "192.168.0.37"
      metrics_port: 9342
      evpn_vtep: true

  # --- Compute servers (Fedora KVM VMs) ------------------------------------
  # 4 racks x 4 servers per rack = 16 servers
  # Each server is dual-homed to both leafs in its rack.
  servers:
    # Rack 1
    - name: srv-1-1
      type: fedora-vm
      role: server
      rack: rack-1
      vcpu: 1
      memory_mb: 768
      loopback: "10.0.4.1/32"
      mgmt_ip: "192.168.0.50"
      metrics_port: 9100          # node_exporter

    - name: srv-1-2
      type: fedora-vm
      role: server
      rack: rack-1
      vcpu: 1
      memory_mb: 768
      loopback: "10.0.4.2/32"
      mgmt_ip: "192.168.0.51"
      metrics_port: 9100

    - name: srv-1-3
      type: fedora-vm
      role: server
      rack: rack-1
      vcpu: 1
      memory_mb: 768
      loopback: "10.0.4.3/32"
      mgmt_ip: "192.168.0.52"
      metrics_port: 9100

    - name: srv-1-4
      type: fedora-vm
      role: server
      rack: rack-1
      vcpu: 1
      memory_mb: 768
      loopback: "10.0.4.4/32"
      mgmt_ip: "192.168.0.53"
      metrics_port: 9100

    # Rack 2
    - name: srv-2-1
      type: fedora-vm
      role: server
      rack: rack-2
      vcpu: 1
      memory_mb: 768
      loopback: "10.0.5.1/32"
      mgmt_ip: "192.168.0.54"
      metrics_port: 9100

    - name: srv-2-2
      type: fedora-vm
      role: server
      rack: rack-2
      vcpu: 1
      memory_mb: 768
      loopback: "10.0.5.2/32"
      mgmt_ip: "192.168.0.55"
      metrics_port: 9100

    - name: srv-2-3
      type: fedora-vm
      role: server
      rack: rack-2
      vcpu: 1
      memory_mb: 768
      loopback: "10.0.5.3/32"
      mgmt_ip: "192.168.0.56"
      metrics_port: 9100

    - name: srv-2-4
      type: fedora-vm
      role: server
      rack: rack-2
      vcpu: 1
      memory_mb: 768
      loopback: "10.0.5.4/32"
      mgmt_ip: "192.168.0.57"
      metrics_port: 9100

    # Rack 3
    - name: srv-3-1
      type: fedora-vm
      role: server
      rack: rack-3
      vcpu: 1
      memory_mb: 768
      loopback: "10.0.6.1/32"
      mgmt_ip: "192.168.0.58"
      metrics_port: 9100

    - name: srv-3-2
      type: fedora-vm
      role: server
      rack: rack-3
      vcpu: 1
      memory_mb: 768
      loopback: "10.0.6.2/32"
      mgmt_ip: "192.168.0.59"
      metrics_port: 9100

    - name: srv-3-3
      type: fedora-vm
      role: server
      rack: rack-3
      vcpu: 1
      memory_mb: 768
      loopback: "10.0.6.3/32"
      mgmt_ip: "192.168.0.60"
      metrics_port: 9100

    - name: srv-3-4
      type: fedora-vm
      role: server
      rack: rack-3
      vcpu: 1
      memory_mb: 768
      loopback: "10.0.6.4/32"
      mgmt_ip: "192.168.0.61"
      metrics_port: 9100

    # Rack 4
    - name: srv-4-1
      type: fedora-vm
      role: server
      rack: rack-4
      vcpu: 1
      memory_mb: 768
      loopback: "10.0.7.1/32"
      mgmt_ip: "192.168.0.62"
      metrics_port: 9100

    - name: srv-4-2
      type: fedora-vm
      role: server
      rack: rack-4
      vcpu: 1
